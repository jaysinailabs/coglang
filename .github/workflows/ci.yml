name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Build release bundle
        run: python -m coglang bundle

      - name: Run release check
        run: python -m coglang release-check

      - name: Run smoke checks
        run: python -m coglang smoke

      - name: Run conformance smoke
        run: python -m coglang conformance smoke
