name: ci

on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Install build frontend
        run: python -m pip install build

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Validate installed wheel
        run: |
          python -m venv .tmp_ci_wheel
          .tmp_ci_wheel/bin/python -m pip install --upgrade pip
          .tmp_ci_wheel/bin/python -m pip install pytest pytest-cov dist/*.whl
          .tmp_ci_wheel/bin/python -m coglang manifest --format json
          .tmp_ci_wheel/bin/python -m coglang release-check --format json
          .tmp_ci_wheel/bin/python -m coglang smoke
          .tmp_ci_wheel/bin/python -m coglang host-demo
          .tmp_ci_wheel/bin/python -m coglang reference-host-demo

      - name: Validate installed sdist
        run: |
          python -m venv .tmp_ci_sdist
          .tmp_ci_sdist/bin/python -m pip install --upgrade pip
          .tmp_ci_sdist/bin/python -m pip install pytest pytest-cov dist/*.tar.gz
          .tmp_ci_sdist/bin/python -m coglang manifest --format json
          .tmp_ci_sdist/bin/python -m coglang release-check --format json
          .tmp_ci_sdist/bin/python -m coglang smoke
          .tmp_ci_sdist/bin/python -m coglang host-demo
          .tmp_ci_sdist/bin/python -m coglang reference-host-demo

      - name: Build release bundle
        run: python -m coglang bundle

      - name: Run release check
        run: python -m coglang release-check

      - name: Run smoke checks
        run: python -m coglang smoke

      - name: Run HRC host demos
        run: |
          python -m coglang host-demo
          python -m coglang reference-host-demo

      - name: Run conformance smoke
        run: python -m coglang conformance smoke
