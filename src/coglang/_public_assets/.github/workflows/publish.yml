name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  pypi:
    name: Publish to PyPI
    if: ${{ startsWith(github.ref_name, 'v') && !contains(github.ref_name, '-') && !contains(github.ref_name, 'rc') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/coglang
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Verify stable tag matches package version
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
              raise SystemExit(f"Refusing to publish non-stable tag: {tag}")

          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]

          expected = tag.removeprefix("v")
          if version != expected:
              raise SystemExit(
                  f"pyproject.toml version {version!r} does not match tag {tag!r}"
              )
          PY

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Validate built wheel before publish
        run: |
          python -m venv .tmp_publish_wheel
          .tmp_publish_wheel/bin/python -m pip install --upgrade pip
          .tmp_publish_wheel/bin/python -m pip install pytest pytest-cov dist/*.whl
          .tmp_publish_wheel/bin/python -m coglang manifest --format json
          .tmp_publish_wheel/bin/python -m coglang release-check --format json
          .tmp_publish_wheel/bin/python -m coglang smoke

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
